name: Generate ESLint lockfile artifact

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-lockfile:
    if: github.event.pull_request.number == 64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Add explicit ESLint flat-config dependencies
        run: npm install --save-dev --package-lock-only --ignore-scripts @eslint/js@^10.0.1 globals@^17.7.0

      - name: Commit generated package files and remove workflow
        run: |
          rm .github/workflows/generate-eslint-lock-artifact.yml
          mkdir -p .github
          printf 'generated\n' > .github/.eslint-lock-generated
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json .github/workflows/generate-eslint-lock-artifact.yml .github/.eslint-lock-generated
          git commit -m "fix(lint): add explicit ESLint flat-config dependencies"
          git push origin HEAD:dependabot/npm_and_yarn/eslint-10.7.0
