name: Generate ESLint lockfile artifact

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  generate-lockfile:
    if: github.event.pull_request.number == 64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Add explicit ESLint flat-config dependencies
        run: npm install --save-dev --package-lock-only --ignore-scripts @eslint/js@^10.0.1 globals@^17.7.0

      - name: Upload generated package files
        uses: actions/upload-artifact@v7
        with:
          name: eslint-package-files
          path: |
            package.json
            package-lock.json
