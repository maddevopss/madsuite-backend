name: Temporary users RLS correction

on:
  push:
    branches:
      - fix/users-test-duplicate-rls-check

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove duplicate unscoped verification
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('src/test/users.test.js')
          content = path.read_text(encoding='utf-8')
          pattern = re.compile(
              r"\n    const dbUser = await db\.query\(\n"
              r"      `\n"
              r"      SELECT organisation_id\n"
              r"      FROM utilisateurs\n"
              r"      WHERE id = \$1\n"
              r"      `,\n"
              r"      \[createdUser\.id\],\n"
              r"    \);\n\n"
              r"    expect\(dbUser\.rows\)\.toHaveLength\(1\);\n"
              r"    expect\(Number\(dbUser\.rows\[0\]\.organisation_id\)\)\.toBe\(organisation\.id\);\n",
              re.MULTILINE,
          )
          updated, count = pattern.subn('', content, count=1)
          if count != 1:
              raise SystemExit(f'Expected one duplicate block, removed {count}')
          path.write_text(updated, encoding='utf-8')
          PY

      - name: Remove temporary workflow and commit correction
        run: |
          rm .github/workflows/_temporary-fix-users-rls.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/test/users.test.js .github/workflows/_temporary-fix-users-rls.yml
          git commit -m "test(users): remove duplicate unscoped RLS assertion"
          git push origin HEAD:fix/users-test-duplicate-rls-check
