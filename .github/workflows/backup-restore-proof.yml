name: Backup Restore P0 Proof

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/backup-restore-proof.yml"
      - "scripts/prove-backup-restore.ps1"
      - "src/migrate/**"
      - "migrations/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prove-backup-restore:
    name: Prove PostgreSQL backup and restore
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      CI: true
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_NAME: madsuite_backup_source_test
      TEST_DB_NAME: madsuite_backup_source_test
      MIGRATION_TEST_DB_NAME: madsuite_backup_source_test
      DATABASE_URL: postgresql://postgres@localhost:5432/madsuite_backup_source_test
      TEST_DATABASE_URL: postgresql://postgres@localhost:5432/madsuite_backup_source_test
      SOURCE_DATABASE_URL: postgresql://postgres@localhost:5432/madsuite_backup_source_test
      TARGET_DATABASE_URL: postgresql://postgres@localhost:5432/madsuite_backup_target_test
      POSTGRES_ADMIN_URL: postgresql://postgres@localhost:5432/postgres
      MADPROOF_ALLOW_DESTRUCTIVE_RESTORE: "YES"
      ENABLE_DB_BACKUP: "0"
      SKIP_MIGRATIONS: "0"
      JWT_SECRET: MadProof-Backup-Restore-2026-Test-Key!
      REDIS_DISABLED: "true"
      SCHEDULERS_ENABLED: "false"
      STRIPE_SECRET_KEY: test-only-placeholder
      STRIPE_WEBHOOK_SECRET: test-only-placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create isolated source and target databases
        run: |
          psql "$POSTGRES_ADMIN_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DROP DATABASE IF EXISTS madsuite_backup_source_test WITH (FORCE);
          DROP DATABASE IF EXISTS madsuite_backup_target_test WITH (FORCE);
          CREATE DATABASE madsuite_backup_source_test;
          CREATE DATABASE madsuite_backup_target_test;
          SQL

      - name: Apply real migrations to source
        run: npm run db:migrate

      - name: Seed representative multi-tenant and financial data
        run: |
          node <<'NODE'
          const db = require('./db');
          const stripeReconciliationService = require('./src/services/stripeReconciliation.service');
          const {
            createTestOrganisation,
            createTestUser,
            createTestClient,
            createTestProjet,
          } = require('./src/test/helpers/testData');

          async function createInvoice({ organisationId, clientId, invoiceNumber }) {
            const result = await db.query(
              `
                INSERT INTO invoices (
                  organisation_id,
                  client_id,
                  invoice_number,
                  status,
                  issue_date,
                  due_date,
                  subtotal,
                  tax_total,
                  total
                )
                VALUES ($1, $2, $3, 'sent', CURRENT_DATE, CURRENT_DATE + INTERVAL '15 days', 125, 0, 125)
                RETURNING *
              `,
              [organisationId, clientId, invoiceNumber],
            );

            return result.rows[0];
          }

          async function main() {
            for (const label of ['A', 'B']) {
              const organisation = await createTestOrganisation({ nom: `MADPROOF Backup Org ${label}` });
              await createTestUser({
                nom: `Admin ${label}`,
                email: `backup-${label.toLowerCase()}@madproof.test`,
                organisation_id: organisation.id,
              });
              const client = await createTestClient({
                nom: `Client Backup ${label}`,
                organisation_id: organisation.id,
              });
              await createTestProjet(client.id, {
                nom: `Projet Backup ${label}`,
                organisation_id: organisation.id,
              });

              const invoice = await createInvoice({
                organisationId: organisation.id,
                clientId: client.id,
                invoiceNumber: `MADPROOF-BACKUP-${label}`,
              });

              if (label === 'A') {
                await stripeReconciliationService.processWebhookEvent({
                  id: 'evt_madproof_backup_restore',
                  type: 'payment_intent.succeeded',
                  data: {
                    object: {
                      id: 'pi_madproof_backup_restore',
                      amount: 12500,
                      currency: 'cad',
                      metadata: {
                        invoice_id: String(invoice.id),
                      },
                    },
                  },
                });
              }
            }
          }

          main()
            .then(() => db.end())
            .catch(async (error) => {
              console.error(error);
              await db.end();
              process.exit(1);
            });
          NODE

      - name: Execute destructive restore proof on disposable target
        shell: pwsh
        run: ./scripts/prove-backup-restore.ps1

      - name: Verify restored tenant and financial markers
        run: |
          psql "$TARGET_DATABASE_URL" -v ON_ERROR_STOP=1 -qAt <<'SQL'
          DO $$
          DECLARE
            organisation_count integer;
            client_count integer;
            invoice_count integer;
            paid_invoice_count integer;
            ledger_count integer;
            ledger_total numeric;
          BEGIN
            SELECT COUNT(*)
            INTO organisation_count
            FROM organisations
            WHERE nom IN ('MADPROOF Backup Org A', 'MADPROOF Backup Org B');

            IF organisation_count <> 2 THEN
              RAISE EXCEPTION 'Expected 2 restored organisations, found %', organisation_count;
            END IF;

            SELECT COUNT(*)
            INTO client_count
            FROM clients
            WHERE nom IN ('Client Backup A', 'Client Backup B');

            IF client_count <> 2 THEN
              RAISE EXCEPTION 'Expected 2 restored clients, found %', client_count;
            END IF;

            SELECT COUNT(*)
            INTO invoice_count
            FROM invoices
            WHERE invoice_number IN ('MADPROOF-BACKUP-A', 'MADPROOF-BACKUP-B');

            IF invoice_count <> 2 THEN
              RAISE EXCEPTION 'Expected 2 restored invoices, found %', invoice_count;
            END IF;

            SELECT COUNT(*)
            INTO paid_invoice_count
            FROM invoices
            WHERE invoice_number = 'MADPROOF-BACKUP-A'
              AND status = 'paid'
              AND total = 125;

            IF paid_invoice_count <> 1 THEN
              RAISE EXCEPTION 'Restored paid invoice invariant failed';
            END IF;

            SELECT COUNT(*), COALESCE(SUM(amount), 0)
            INTO ledger_count, ledger_total
            FROM ledger_entries
            WHERE reference_type = 'stripe_webhook'
              AND reference_id = 'evt_madproof_backup_restore'
              AND type = 'payment_received'
              AND currency = 'cad';

            IF ledger_count <> 1 OR ledger_total <> 125 THEN
              RAISE EXCEPTION 'Restored ledger invariant failed: count %, total %', ledger_count, ledger_total;
            END IF;
          END
          $$;
          SQL

      - name: Verify RLS and append-only ledger survived restore
        run: |
          psql "$TARGET_DATABASE_URL" -v ON_ERROR_STOP=1 -qAt <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (
              SELECT 1
              FROM pg_class c
              JOIN pg_namespace n ON n.oid = c.relnamespace
              WHERE n.nspname = 'public'
                AND c.relname = 'clients'
                AND c.relrowsecurity
            ) THEN
              RAISE EXCEPTION 'RLS is not enabled on clients after restore';
            END IF;

            IF NOT EXISTS (
              SELECT 1
              FROM pg_policies
              WHERE schemaname = 'public'
                AND tablename = 'clients'
            ) THEN
              RAISE EXCEPTION 'No clients RLS policy found after restore';
            END IF;

            IF NOT EXISTS (
              SELECT 1
              FROM pg_trigger
              WHERE tgrelid = 'public.ledger_entries'::regclass
                AND NOT tgisinternal
            ) THEN
              RAISE EXCEPTION 'Ledger append-only trigger missing after restore';
            END IF;
          END
          $$;
          SQL

      - name: Start backend on restored database and verify health
        env:
          DB_NAME: madsuite_backup_target_test
          TEST_DB_NAME: madsuite_backup_target_test
          MIGRATION_TEST_DB_NAME: madsuite_backup_target_test
          DATABASE_URL: postgresql://postgres@localhost:5432/madsuite_backup_target_test
          TEST_DATABASE_URL: postgresql://postgres@localhost:5432/madsuite_backup_target_test
          SKIP_MIGRATIONS: "1"
          PORT: "5050"
        run: |
          node server.js > artifacts/backup-restore/restored-backend.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:5050/api/health > artifacts/backup-restore/restored-health.json; then
              break
            fi

            if ! kill -0 "$server_pid" 2>/dev/null; then
              cat artifacts/backup-restore/restored-backend.log
              exit 1
            fi

            sleep 1
          done

          curl --fail --silent http://127.0.0.1:5050/api/health | tee artifacts/backup-restore/restored-health.json
          grep -q '"status":"ok"' artifacts/backup-restore/restored-health.json
          grep -q '"database":"ok"' artifacts/backup-restore/restored-health.json

      - name: Upload MADPROOF backup restore evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: madproof-backup-restore-evidence
          path: artifacts/backup-restore/
          if-no-files-found: error
          retention-days: 14
